name: test

on: [push, pull_request]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24, 25, 26]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      # Cross-package imports resolve to each package's built lib/, so the
      # suite needs the monorepo built before vitest can load the test files.
      - run: npm run build
      - run: npm test
