name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # The action omits the trigger comment's file/line anchor from its prompt
          # (anthropics/claude-code-action#855), so pass the comment id in and have
          # Claude fetch its own anchor via gh. The id is numeric, so interpolating
          # it here is injection-safe; the app token is read-only regardless.
          claude_args: >-
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(gh issue view:*)"
            --append-system-prompt "Trigger review comment id: '${{ github.event_name == 'pull_request_review_comment' && github.event.comment.id || '' }}'. If that id is non-empty, you were triggered by a PR review comment anchored to specific code: run gh api repos/${{ github.repository }}/pulls/comments/<id> to get its path, line, start_line, and diff_hunk. Words like 'this' in the trigger comment refer to that anchored code, not to earlier threads. Read the anchored file itself for full context before answering."

