name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Skip the permission system entirely so Claude can read the event payload
          # (outside the repo checkout) and use gh freely. Safe-ish here: the action
          # only triggers for actors with write access, and the app token is read-only.
          # The action omits the trigger comment's file/line anchor from its prompt,
          # so point Claude at the raw event payload to recover it.
          claude_args: >-
            --dangerously-skip-permissions
            --append-system-prompt "When triggered by a PR review comment, first read the event payload file at the path in the GITHUB_EVENT_PATH environment variable; use .comment.path, .comment.line, and .comment.diff_hunk as the anchor. Words like 'this' in the trigger comment refer to that anchored code, not to earlier threads."

