name: deploy-site

# Deploy quidproquojs.com. Every push to main auto-deploys the DEVELOPMENT
# environment. Production (and staging) are manual only — run from the Actions
# tab ("Run workflow") and pick the environment.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        type: choice
        default: production
        options: [development, staging, production]

# Required for GitHub OIDC -> AWS role assumption. No long-lived keys stored.
permissions:
  id-token: write
  contents: read

# Serialize deploys per environment so rapid pushes queue instead of racing.
# Never cancel a running deploy — a half-applied CloudFormation stack is worse
# than waiting.
concurrency:
  group: deploy-site-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'development' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # push -> development; manual dispatch -> the chosen environment. The GitHub
    # Environment supplies the per-account role ARN + region, and is where you
    # add required reviewers to gate production behind a manual approval.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'development' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: quidproquojs.com/.nvmrc

      # Build the monorepo first: quidproquojs.com pulls the quidproquo-*
      # packages via file: refs, which resolve to each package's built lib/.
      - run: npm ci
      - run: npm run build

      # Install the site (links the file: deps) and build the docs site — the
      # web stack uploads docusaurus/build, and qpq does not build it for us.
      - run: npm ci
        working-directory: quidproquojs.com
      - run: npm run build --workspace docusaurus
        working-directory: quidproquojs.com

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          # Set per GitHub Environment (Settings -> Environments -> <env> ->
          # Variables), so each account/region supplies its own role + region.
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Fully non-interactive deploy: all services, all stacks (inf -> api ->
      # web -> views), in parallel via docker. The AWS_* creds set by the step
      # above are passed through to the deploy containers.
      - run: npx qpq go:docker all all --app qpqjs --env ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'development' }}
        working-directory: quidproquojs.com
